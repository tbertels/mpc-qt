name: AppImage maker

on:
  push:
  pull_request:

jobs:
  build:
    name: Build with Tumbleweed
    runs-on: ubuntu-latest
    container:
      image: "registry.opensuse.org/home/mia/images/images/mpv-ci:stable-deps"

    steps:
    - name: Install packages
      run: zypper install pkg-config qmake6 qt6-base-dev qt6-l10n-tools libqt6svg6-dev libgl-dev libmpv-dev
        # sudo apt-get update
        # sudo apt-get -y install build-essential qmake6 qt6-base-dev qt6-l10n-tools libqt6svg6-dev libgl-dev libmpv-dev
    - name: Checkout repository
      uses: actions/checkout@v4
    - name: qmake
      run: qmake6 MPCQT_VERSION=GithubAction mpc-qt.pro
    - name: make
      run: make
    - name: make install
      run: make install INSTALL_ROOT=AppDir
    - name: ls -R -l AppDir
      run:  ls -R -l AppDir
    - name: Upload mpc-qt AppDir
      uses: actions/upload-artifact@v4
      with:
        name: AppDir
        path: AppDir

