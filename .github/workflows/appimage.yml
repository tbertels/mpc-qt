name: AppImage maker

on:
  push:
  pull_request:

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest

    steps:
    - name: Install packages
      run: sudo apt-get -y install build-essential qmake6 qt6-base-dev qt6-l10n-tools libqt6svg6-dev libgl-dev libmpv-dev
    - uses: actions/checkout@v4
    - name: qmake
      run: qmake6 MPCQT_VERSION=GithubAction mpc-qt.pro
    - name: make
      run: make
    - name: make install
      run: make install INSTALL_ROOT=AppDir
    - name: ls -R AppDir
      run:  ls -R AppDir
    - name: Upload mpc-qt AppDir
      uses: actions/upload-artifact@v4
      with:
        name: AppDir
        path: AppDir

  craft:
    name: AppImage
    runs-on: ubuntu-latest
    needs: build

    steps:
    - name: Install packages
      run: sudo apt-get -y install libfuse2 libqt6svg6-dev qmake6
    - name: Download mpc-qt AppDir
      uses: actions/download-artifact@v4
      with:
        name: AppDir
        path: AppDir
    - name: Install LinuxDeploy
      uses: miurahr/install-linuxdeploy-action@v1
      with:
        plugins: qt appimage
    - name: ls
      run:  ls
    - name: Build AppImage
      run: EXTRA_QT_PLUGINS="svg;" QMAKE=/usr/bin/qmake6 linuxdeploy-x86_64.AppImage --appdir AppDir -i AppDir/usr/local/share/icons/hicolor/scalable/apps/mpc-qt.svg -d AppDir/usr/local/share/applications/mpc-qt.desktop --plugin qt --output appimage
    - name: ls
      run:  ls
